
# OpenAI configuration (better for tool calling)
quarkus.langchain4j.openai.api-key=${OPENAI_API_KEY}
quarkus.langchain4j.openai.chat-model.temperature=0.8
quarkus.langchain4j.openai.chat-model.model-name=gpt-4o-mini
quarkus.langchain4j.openai.timeout=PT3M

quarkus.langchain4j.log-requests=true
quarkus.langchain4j.log-responses=true

# Use Ollama for local, sovereign inference (commented out)
# quarkus.langchain4j.ollama.chat-model.model-id=llama3.2
# quarkus.langchain4j.ollama.base-url=http://localhost:11434
# quarkus.langchain4j.ollama.timeout=PT3M
# quarkus.langchain4j.ollama.chat-model.temperature=0.8

# REST Client configuration for ShippingServiceApi
quarkus.rest-client.shipping-api.url=http://localhost:8080
quarkus.rest-client.shipping-api.scope=jakarta.inject.Singleton